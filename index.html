<!DOCTYPE html>
<html>
<head>
  <title>App Liz</title>
</head>
<body>

  <h1>App Liz</h1>
  <h3 id="version"></h3>

  <!-- LOGIN -->
  <div id="loginDiv">
    <h2>Login</h2>
    <input id="user" placeholder="Usuario">
    <input id="pass" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <!-- APP -->
  <div id="appDiv" style="display:none;">
    <h2>Formulario</h2>
    <input id="nombre" placeholder="Nombre">
    <input id="producto" placeholder="Producto">
    <button onclick="enviar()">Enviar</button>

    <h3>Registros:</h3>
    <ul id="lista"></ul>
  </div>

  <script>
    // 🔹 mostrar versión
    fetch('/version')
      .then(res => res.text())
      .then(data => {
        document.getElementById('version').innerText = data;
      });

    // 🔹 cargar registros desde MySQL
    async function cargarRegistros() {
      const res = await fetch('/registros');
      const data = await res.json();

      const lista = document.getElementById('lista');
      lista.innerHTML = "";

      data.forEach(reg => {
        const li = document.createElement('li');
        li.innerText = reg.nombre + " - " + reg.producto;
        lista.appendChild(li);
      });
    }

    // 🔹 login
    async function login() {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          user: document.getElementById('user').value,
          pass: document.getElementById('pass').value
        })
      });

      const data = await res.json();

      if (res.status === 200) {
        document.getElementById('loginDiv').style.display = 'none';
        document.getElementById('appDiv').style.display = 'block';

        cargarRegistros(); // 👈 cargar registros al entrar
      } else {
        alert(data.message);
      }
    }

    // 🔹 enviar formulario
    async function enviar() {
      const res = await fetch('/form', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          nombre: document.getElementById('nombre').value,
          producto: document.getElementById('producto').value
        })
      });

      const data = await res.json();

      if (res.status === 200) {
        cargarRegistros(); // 👈 refresca lista desde DB
      } else {
        alert(data.message);
      }
    }
  </script>

</body>
</html>

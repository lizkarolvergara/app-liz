version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: mysql-liz
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: appdb
    ports:
      - "3307:3306"

  app:
    build: .
    container_name: app-liz
    ports:
      - "3001:3000"
    depends_on:
      - mysql